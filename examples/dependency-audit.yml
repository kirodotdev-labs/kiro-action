# Weekly dependency audit and auto-update.
#
# Every Monday at 9am UTC, Kiro checks for outdated or vulnerable
# dependencies, applies safe non-breaking upgrades, and opens a PR.

name: Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: karancode/kiro-action@v0
        with:
          kiro_api_key: ${{ secrets.KIRO_API_KEY }}
          prompt: |
            Audit this repository's dependencies.

            Tasks:
              1. List all direct dependencies and their currently installed versions
              2. Identify outdated dependencies (especially those with security advisories)
              3. For each dependency, determine if a safe non-breaking upgrade is available
              4. Apply patch and minor version upgrades that are reverse-compatible
              5. Run the test suite to verify nothing broke
              6. Open a single PR with all the upgrades, listing what changed and why

            For major version upgrades or anything that fails tests, open an issue
            instead — list each one with a link to the upstream changelog. Do not
            attempt risky upgrades automatically.
