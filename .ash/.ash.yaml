# ASH (Automated Security Helper) configuration
# https://github.com/awslabs/automated-security-helper
project_name: kiro-action
global_settings:
  severity_threshold: MEDIUM
  suppressions:
    # detect-secrets flags the fake API key used in unit tests. It's an
    # intentional fixture, not a real credential.
    - rule_id: "SECRET-*"
      path: "tests/**"
      reason: "Test fixtures use intentional placeholder secrets for validation"
  ignore_paths:
    # dist/index.js is the committed, minified bundle (generated by `bun run
    # build`). Its minified variable names and bundled-dependency strings trip
    # detect-secrets' entropy/keyword heuristics. It is generated output, not
    # source — scan src/ instead.
    - path: "dist/**"
      reason: "Generated minified bundle, not source code"
